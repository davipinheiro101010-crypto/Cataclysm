<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cataclysm: Global Power</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { 
            --accent: #8b4513; 
            --boost: #ffd700; 
            --cheat: #00ff41; 
            --ui-bg: rgba(10, 10, 10, 0.98);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; position: fixed; }

        #map { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        .map-dark { filter: grayscale(1) brightness(0.3); }
        .map-satellite { filter: saturate(1.5) brightness(1); }

        /* HUD */
        #top-info { 
            position: absolute; top: 20px; left: 20px; z-index: 1000; 
            background: var(--ui-bg); padding: 15px; border-radius: 12px; 
            border: 1px solid #333; border-left: 5px solid var(--accent);
            pointer-events: none;
        }
        .money-text { font-size: 28px; font-weight: bold; color: #00ffaa; }

        /* TIMER BOOSTER (O Círculo que gira) */
        #booster-timer-ui {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; display: none; align-items: center; gap: 10px;
            background: rgba(0,0,0,0.85); padding: 8px 18px; border-radius: 30px; border: 1px solid var(--boost);
        }
        .timer-circle {
            width: 26px; height: 26px; border-radius: 50%;
            background: conic-gradient(var(--boost) var(--perc, 0deg), transparent 0);
            display: flex; align-items: center; justify-content: center; position: relative;
        }
        .timer-circle::after { content: ''; width: 18px; height: 18px; background: #111; border-radius: 50%; position: absolute; }

        /* FEED DE NOTÍCIAS */
        #news-feed {
            position: absolute; bottom: 100px; left: 20px; z-index: 1000;
            width: 280px; height: 160px; background: rgba(0,0,0,0.85);
            border-radius: 10px; border: 1px solid #444;
            overflow: hidden; pointer-events: none;
            display: flex; flex-direction: column-reverse; padding: 10px;
        }
        .news-item { font-size: 11px; color: #ffffff; margin-bottom: 6px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 4px; }
        .news-user { color: var(--boost); font-weight: bold; margin-right: 5px; }

        /* BOTÕES */
        .floating-btn { position: absolute; z-index: 1100; background: #111; color: white; border: 1px solid #444; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        #btn-config-toggle { bottom: 25px; right: 25px; width: 55px; height: 55px; font-size: 24px; }
        #btn-shop-toggle { top: 20px; right: 20px; width: 55px; height: 55px; font-size: 24px; }

        .side-panel { position: absolute; top: 0; right: -320px; width: 300px; height: 100%; background: var(--ui-bg); z-index: 1200; transition: 0.4s; padding: 25px; border-left: 3px solid var(--accent); overflow-y: auto; }
        .side-panel.active { right: 0; }
        #config-panel { position: absolute; bottom: 90px; right: 25px; background: var(--ui-bg); border: 1px solid #333; width: 300px; border-radius: 16px; display: none; z-index: 1100; padding: 20px; }
        .item-card { background: rgba(255,255,255,0.05); border: 1px solid #333; color: white; width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; text-align: left; cursor: pointer;}
        
        #action-bar { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; gap: 15px; }
        .btn-game { padding: 15px 35px; font-size: 16px; font-weight: bold; border-radius: 10px; border: none; color: white; text-transform: uppercase; cursor: pointer; }
        #btn-attack { background: #e63946; }
        #btn-auto { background: #457b9d; }
        #btn-auto.active { background: #2a9d8f; box-shadow: 0 0 15px #2a9d8f; }

        /* DESASTRES */
        #disaster-core { position: absolute; top: 50%; left: 50%; z-index: 500; pointer-events: none; transition: 0.1s; }
        .effect-terremoto { background: radial-gradient(circle, rgba(139,69,19,0.5) 0%, transparent 70%); border: 3px dashed #5c2e0c; border-radius: 50%; animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: translate(2px, 2px); } 50% { transform: translate(-2px, -2px); } 100% { transform: translate(2px, -2px); } }
        .effect-tornado { background: conic-gradient(from 0deg, #444, #fff, #888, #222, #444); opacity: 0.8; border-radius: 50%; animation: spin 0.4s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .effect-tsunami { background: linear-gradient(to bottom, #00aaff, #004488); border: 4px solid #fff; border-radius: 5px; box-shadow: 0 0 30px #00aaff; animation: wave 1.5s ease-in-out infinite; }
        @keyframes wave { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(1.3); } }
    </style>
</head>
<body>

    <div id="top-info">
        <div id="type-display" style="font-size: 10px; color: var(--boost); font-weight: bold;">TERREMOTO</div>
        <div id="lvl-display" style="font-size: 12px; color: #888;">NÍVEL 1</div>
        <div id="money-display" class="money-text">$0</div>
        <div id="gain-info" style="font-size: 10px; color: #555;">Ganho: $10 - $250</div>
    </div>

    <div id="news-feed"></div>

    <div id="booster-timer-ui">
        <div class="timer-circle" id="circle-fill"></div>
        <div style="font-size: 12px; color: var(--boost); font-weight: bold;">2X ATIVO</div>
    </div>

    <button id="btn-config-toggle" class="floating-btn" onclick="toggleConfig(event)">⚙️</button>
    <button id="btn-shop-toggle" class="floating-btn" onclick="toggleShop(event)">🛒</button>

    <div id="side-shop" class="side-panel" onclick="event.stopPropagation()">
        <h2 style="color: var(--boost);">SHOP</h2>
        <button class="item-card" onclick="buyBooster()"><b>💰 2x Multiplier (10m)</b><br><small>$17,500</small></button>
        <button class="item-card" onclick="buyLevel(1)">+1 Lvl ($500)</button>
        <button class="item-card" onclick="buyLevel(10)">+10 Lvl ($4,500)</button>
        <button class="item-card" onclick="buyLevel(100)">+100 Lvl ($40,000)</button>
        <button class="item-card" style="background: #333; margin-top: 20px; text-align: center;" onclick="toggleShop(event)">VOLTAR</button>
    </div>

    <div id="config-panel" onclick="event.stopPropagation()">
        <input type="text" id="cheat-box" class="admin-input" placeholder="Código Admin...">
        <button onclick="checkCheat()" class="item-card">EXECUTAR</button>
        <div id="cheat-admin-area" style="display:none;">
            <input type="number" id="set-money" class="admin-input" placeholder="Dinheiro">
            <input type="number" id="set-level" class="admin-input" placeholder="Nível">
            <button class="item-card" style="color:var(--cheat)" onclick="applyAdminStats()">APLICAR</button>
        </div>
        <button class="item-card" onclick="setTheme('map-dark')">Modo Noite</button>
        <button class="item-card" onclick="setTheme('map-satellite')">Satélite</button>
        <button class="item-card" style="color:red" onclick="resetGame()">RESETAR TUDO</button>
    </div>

    <div id="action-bar">
        <button id="btn-attack" class="btn-game" onclick="attack()">Atacar</button>
        <button id="btn-auto" class="btn-game" onclick="toggleAuto()">Auto</button>
    </div>

    <div id="disaster-core"></div>
    <div id="map" class="map-dark"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Carregar dados salvos ou iniciar do zero
        let money = parseInt(localStorage.getItem('cat_money')) || 0;
        let level = parseInt(localStorage.getItem('cat_level')) || 1;
        let isAuto = false;
        let boostTime = 0; // Segundos restantes de 2x
        let boostInterval = null;

        const users = ["@pedro_vix", "@marina_sky", "@defesa_civil", "@jornal_local", "@curioso_99", "@tia_do_zap", "@geologo_pro"];
        const quotes = {
            terremoto: ["Tremor leve sentido aqui!", "As janelas estão batendo!", "Senti o chão vibrar.", "É um terremoto?"],
            tornado: ["CÉU PRETO! CORRAM!", "O vento está levando tudo!", "Sirenes de tornado ligadas!", "Vi um redemoinho ali!"],
            tsunami: ["O MAR RECUOU! FUJAM!", "Parede de água vindo!", "Subam pros prédios!", "A cidade vai inundar!"]
        };

        const map = L.map('map', { center: [-23.5505, -46.6333], zoom: 17, zoomControl: false });
        const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');
        const defaultLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

        function addNews() {
            const feed = document.getElementById('news-feed');
            const item = document.createElement('div');
            item.className = 'news-item';
            let pool = (level < 200) ? quotes.terremoto : (level < 1500 ? quotes.tornado : quotes.tsunami);
            let user = users[Math.floor(Math.random() * users.length)];
            let text = pool[Math.floor(Math.random() * pool.length)];
            item.innerHTML = `<span class="news-user">${user}</span> ${text}`;
            feed.prepend(item);
            if(feed.childNodes.length > 5) feed.removeChild(feed.lastChild);
        }
        setInterval(addNews, 4000);

        function earnMoney() {
            let bonus = Math.floor(level / 500) * 1000;
            let baseGain = Math.floor(Math.random() * 240 + 10) + bonus;
            
            // Multiplicadores
            let typeMult = (level >= 1500) ? 2.5 : (level >= 200 ? 2.0 : 1.0);
            let active2x = (boostTime > 0) ? 2 : 1; // Verifica se o 2x está ativo

            money += Math.floor(baseGain * typeMult * active2x);
            
            // Salva progresso
            localStorage.setItem('cat_money', money);
            localStorage.setItem('cat_level', level);
            
            document.getElementById('gain-info').innerText = `Ganho: $${(10 + bonus)} - $${(250 + bonus)} (x${(typeMult * active2x).toFixed(1)})`;
            updateUI();
        }

        function buyBooster() {
            if (money >= 17500) {
                money -= 17500;
                boostTime += 600; // Adiciona 10 minutos (600 segundos)
                if(!boostInterval) startBoostTimer();
                updateUI();
            }
        }

        function startBoostTimer() {
            document.getElementById('booster-timer-ui').style.display = 'flex';
            boostInterval = setInterval(() => {
                if(boostTime > 0) {
                    boostTime--;
                    let perc = (boostTime / 600) * 360;
                    document.getElementById('circle-fill').style.setProperty('--perc', perc + 'deg');
                } else {
                    clearInterval(boostInterval);
                    boostInterval = null;
                    document.getElementById('booster-timer-ui').style.display = 'none';
                }
            }, 1000);
        }

        function updateUI() {
            document.getElementById('money-display').innerText = `$${money.toLocaleString()}`;
            document.getElementById('lvl-display').innerText = `NÍVEL ${level}`;
            const core = document.getElementById('disaster-core');
            const type = document.getElementById('type-display');
            core.className = '';
            if (level < 200) {
                type.innerText = "TERREMOTO"; core.classList.add('effect-terremoto');
                let s = 100 + (level * 0.5); core.style.width = s+'px'; core.style.height = s+'px'; core.style.margin = `-${s/2}px 0 0 -${s/2}px`;
            } else if (level < 1500) {
                type.innerText = "TORNADO"; core.classList.add('effect-tornado');
                let s = 150 + (level * 0.3); core.style.width = s+'px'; core.style.height = s+'px'; core.style.margin = `-${s/2}px 0 0 -${s/2}px`;
            } else {
                type.innerText = "TSUNAMI"; core.classList.add('effect-tsunami');
                core.style.width = "400px"; core.style.height = "60px"; core.style.margin = "-30px 0 0 -200px";
            }
        }

        function toggleShop(e) { e.stopPropagation(); document.getElementById('side-shop').classList.toggle('active'); }
        function toggleConfig(e) { e.stopPropagation(); const p = document.getElementById('config-panel'); p.style.display = (p.style.display==='block')?'none':'block'; }
        function checkCheat() { if(document.getElementById('cheat-box').value.toLowerCase().includes("vinicius")) document.getElementById('cheat-admin-area').style.display='block'; }
        function applyAdminStats() {
            const m = document.getElementById('set-money').value; const l = document.getElementById('set-level').value;
            if(m!=="") money = parseInt(m); if(l!=="") level = parseInt(l); updateUI();
        }
        function buyLevel(a) { 
            let c = (a===100)?40000:(a===10?4500:500); 
            if(money>=c){money-=c; level+=a; updateUI();} 
        }
        function resetGame() { if(confirm("Deseja resetar tudo?")) { localStorage.clear(); location.reload(); } }
        function setTheme(t) { 
            document.getElementById('map').className = t; 
            if(t==='map-satellite'){map.removeLayer(defaultLayer); satelliteLayer.addTo(map);}else{map.removeLayer(satelliteLayer); defaultLayer.addTo(map);}
        }
        function attack() { earnMoney(); }
        function toggleAuto() { isAuto=!isAuto; document.getElementById('btn-auto').classList.toggle('active'); if(isAuto) autoInterval=setInterval(earnMoney,500); else clearInterval(autoInterval); }
        
        updateUI();
    </script>
</body>
</html>
